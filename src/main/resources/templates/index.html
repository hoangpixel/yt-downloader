<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tải Video YouTube</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .preview-card {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="card shadow-lg mx-auto border-0 rounded-4" style="max-width: 600px;">
            <div class="card-body p-5">
                <h3 class="card-title text-center mb-4 fw-bold text-danger">
                    <i class="bi bi-youtube"></i> YT Downloader
                </h3>

                <div class="mb-4">
                    <input type="url" id="youtubeLink" class="form-control form-control-lg text-center" 
                           placeholder="Dán link YouTube vào đây...">
                </div>

                <div id="previewSection" class="d-none preview-card">
                    <div class="card mb-4 border-0">
                        <img id="videoThumbnail" src="" class="card-img-top rounded-3 shadow-sm" alt="Thumbnail">
                        <div class="card-body px-0 text-center">
                            <h5 id="videoTitle" class="card-title fw-semibold mt-2">Tiêu đề video</h5>
                        </div>
                    </div>

                    <div class="row g-2">
                        <div class="col-sm-8">
                            <select class="form-select form-select-lg" id="formatSelect">
                                <option value="mp4_1080">MP4 - 1080p</option>
                                <option value="mp4_720" selected>MP4 - 720p (Khuyên dùng)</option>
                                <option value="mp3">MP3 - Audio (320kbps)</option>
                            </select>
                        </div>
                        <div class="col-sm-4">
                            <button class="btn btn-danger w-100 btn-lg" id="downloadBtn">
                                Tải Về
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- PHẦN 1: KHAI BÁO CÁC PHẦN TỬ TRÊN GIAO DIỆN ---
        const linkInput = document.getElementById('youtubeLink');
        const previewSection = document.getElementById('previewSection');
        const thumbnail = document.getElementById('videoThumbnail');
        const title = document.getElementById('videoTitle');
        const downloadBtn = document.getElementById('downloadBtn');

        // --- PHẦN 2: LOGIC HIỆN THUMBNAIL KHI DÁN LINK ---
        linkInput.addEventListener('input', function() {
            const url = this.value.trim();
            
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                // Tạm thời hardcode data để test giao diện
                thumbnail.src = 'https://img.youtube.com/vi/dQw4w9WgXcQ/maxresdefault.jpg';
                title.innerText = 'Rick Astley - Never Gonna Give You Up (Official Music Video)';
                
                // Hiện khu vực preview
                previewSection.classList.remove('d-none');
            } else if (url === '') {
                previewSection.classList.add('d-none');
            }
        });

        // --- PHẦN 3: LOGIC GỬI LINK XUỐNG SPRING BOOT ĐỂ TẢI ---
        downloadBtn.addEventListener('click', function() {
            const url = linkInput.value.trim();
            
            if (!url) {
                alert('Ê, chưa dán link YouTube kìa!');
                return;
            }

            // Hiệu ứng loading cho nút bấm
            const originalText = downloadBtn.innerHTML;
            downloadBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Đang tải ngầm...';
            downloadBtn.disabled = true;

            const formData = new URLSearchParams();
            formData.append('url', url);

            // Bắn request xuống API của Spring Boot
            fetch('/api/download', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData
            })
            .then(response => response.text())
            .then(data => {
                alert(data + "\n\nHãy mở thư mục Downloads của máy tính lên và đợi một chút để xem thành quả nhé!");
            })
            .catch(error => {
                console.error('Lỗi rồi:', error);
                alert('Có lỗi mạng hoặc server khi kết nối!');
            })
            .finally(() => {
                // Trả nút về trạng thái ban đầu
                downloadBtn.innerHTML = originalText;
                downloadBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
